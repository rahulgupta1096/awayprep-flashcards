<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plastic Surgery Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --red: #ef4444;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Login screen ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .login-box h1 {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }

  .login-box p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  .login-box input {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
  }

  .login-box input:focus { border-color: var(--accent); }

  .login-box .error {
    color: var(--red);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
    display: none;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.7rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    color: #fff;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-green { background: var(--green); }
  .btn-green:hover { background: #16a34a; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--surface2); }

  .btn-full { width: 100%; }

  /* ── App layout ── */
  #app { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar h1 { font-size: 1.1rem; }

  .topbar-right { display: flex; gap: 0.5rem; align-items: center; }

  .counter {
    color: var(--text-dim);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  /* ── Topic picker ── */
  #topic-screen { padding: 1rem 1.25rem 6rem; max-width: 700px; margin: 0 auto; }

  .picker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .picker-header h2 { font-size: 1.2rem; }

  .picker-actions { display: flex; gap: 0.5rem; }

  .topic-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }

  .topic-header {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    cursor: pointer;
    user-select: none;
    gap: 0.75rem;
  }

  .topic-header:hover { background: var(--surface2); }

  .topic-header .arrow {
    font-size: 0.7rem;
    transition: transform 0.2s;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .topic-header .arrow.open { transform: rotate(90deg); }

  .topic-header label {
    flex: 1;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
  }

  .topic-header .badge {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    flex-shrink: 0;
  }

  .subtopic-list {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0.25rem 0;
  }

  .subtopic-list.open { display: block; }

  .subtopic-item {
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem 0.5rem 2.75rem;
    gap: 0.75rem;
    cursor: pointer;
  }

  .subtopic-item:hover { background: rgba(59,130,246,0.06); }

  .subtopic-item label {
    flex: 1;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  .subtopic-item .badge {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 999px;
    flex-shrink: 0;
  }

  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── Sticky start bar ── */
  .start-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 10;
  }

  .start-bar .count {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* ── Quiz screen ── */
  #quiz-screen { display: none; padding: 1rem 1.25rem; max-width: 700px; margin: 0 auto; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .tag {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.78rem;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
  }

  .tag.topic { border-left: 3px solid var(--accent); }
  .tag.subtopic { border-left: 3px solid var(--green); }

  .card-question {
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .card-answer {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    line-height: 1.65;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    white-space: pre-wrap;
  }

  .card-answer.visible { display: block; }

  .card-notes {
    color: var(--text-dim);
    font-size: 0.82rem;
    font-style: italic;
    margin-top: 0.5rem;
  }

  .quiz-actions {
    display: flex;
    gap: 0.75rem;
  }

  .quiz-actions .btn { flex: 1; }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    border-radius: 2px;
  }

  /* ── Done screen ── */
  .done-screen {
    text-align: center;
    padding: 3rem 1rem;
  }

  .done-screen h2 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .done-screen p {
    color: var(--text-dim);
    margin-bottom: 1.5rem;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .topbar h1 { font-size: 0.95rem; }
    .card { padding: 1.15rem; }
    .card-question { font-size: 0.98rem; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>Plastic Surgery Flashcards</h1>
    <p>429 questions across 30 topics</p>
    <div class="error" id="login-error">Incorrect password</div>
    <input type="password" id="password-input" placeholder="Enter password" autocomplete="off">
    <button class="btn btn-primary btn-full" id="login-btn">Enter</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <h1>Flashcards</h1>
    <div class="topbar-right">
      <span class="counter" id="topbar-counter"></span>
      <button class="btn btn-outline" id="back-to-topics" style="display:none; padding:0.4rem 0.8rem; font-size:0.85rem;">Topics</button>
    </div>
  </div>

  <!-- Topic picker -->
  <div id="topic-screen">
    <div class="picker-header">
      <h2>Select Topics</h2>
      <div class="picker-actions">
        <button class="btn btn-outline" id="select-all" style="padding:0.4rem 0.8rem; font-size:0.85rem;">Select All</button>
        <button class="btn btn-outline" id="deselect-all" style="padding:0.4rem 0.8rem; font-size:0.85rem;">Deselect All</button>
      </div>
    </div>
    <div id="topic-list"></div>
    <div class="start-bar">
      <span class="count" id="selected-count">0 questions selected</span>
      <button class="btn btn-green" id="start-btn">Start</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz-screen">
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="card">
      <div class="card-meta">
        <span class="tag topic" id="q-topic"></span>
        <span class="tag subtopic" id="q-subtopic"></span>
      </div>
      <div class="card-question" id="q-question"></div>
      <div class="card-answer" id="q-answer"></div>
      <div class="card-notes" id="q-notes"></div>
    </div>
    <div class="quiz-actions">
      <button class="btn btn-primary" id="reveal-btn">Reveal Answer</button>
      <button class="btn btn-green" id="next-btn" style="display:none;">Next</button>
    </div>
  </div>
</div>

<script src="cards.js"></script>
<script>
(function() {
  // ── State ──
  let deck = [];
  let idx = 0;
  let answerRevealed = false;

  // ── Elements ──
  const loginScreen = document.getElementById('login-screen');
  const app = document.getElementById('app');
  const passwordInput = document.getElementById('password-input');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');

  const topicScreen = document.getElementById('topic-screen');
  const topicList = document.getElementById('topic-list');
  const selectAllBtn = document.getElementById('select-all');
  const deselectAllBtn = document.getElementById('deselect-all');
  const selectedCount = document.getElementById('selected-count');
  const startBtn = document.getElementById('start-btn');

  const quizScreen = document.getElementById('quiz-screen');
  const backBtn = document.getElementById('back-to-topics');
  const topbarCounter = document.getElementById('topbar-counter');
  const progressFill = document.getElementById('progress-fill');
  const qTopic = document.getElementById('q-topic');
  const qSubtopic = document.getElementById('q-subtopic');
  const qQuestion = document.getElementById('q-question');
  const qAnswer = document.getElementById('q-answer');
  const qNotes = document.getElementById('q-notes');
  const revealBtn = document.getElementById('reveal-btn');
  const nextBtn = document.getElementById('next-btn');

  // ── Auth ──
  const PASS = 'rgdabest';

  function checkSession() {
    if (sessionStorage.getItem('fc_auth') === '1') showApp();
  }

  function tryLogin() {
    if (passwordInput.value === PASS) {
      sessionStorage.setItem('fc_auth', '1');
      loginError.style.display = 'none';
      showApp();
    } else {
      loginError.style.display = 'block';
      passwordInput.value = '';
      passwordInput.focus();
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  function showApp() {
    loginScreen.style.display = 'none';
    app.style.display = 'block';
    buildTopicPicker();
  }

  // ── Build topic/subtopic tree ──
  function getTree() {
    const tree = {};
    CARDS.forEach(c => {
      if (!tree[c.topic]) tree[c.topic] = {};
      if (!tree[c.topic][c.subtopic]) tree[c.topic][c.subtopic] = 0;
      tree[c.topic][c.subtopic]++;
    });
    return tree;
  }

  function buildTopicPicker() {
    const tree = getTree();
    const topics = Object.keys(tree).sort();
    topicList.innerHTML = '';

    topics.forEach(topic => {
      const subtopics = Object.keys(tree[topic]).sort();
      const topicCount = subtopics.reduce((s, st) => s + tree[topic][st], 0);
      const tid = 't_' + slug(topic);

      const group = document.createElement('div');
      group.className = 'topic-group';

      // Header
      const header = document.createElement('div');
      header.className = 'topic-header';
      header.innerHTML = `
        <span class="arrow">&#9654;</span>
        <input type="checkbox" id="${tid}" checked>
        <label for="${tid}">${topic}</label>
        <span class="badge">${topicCount}</span>
      `;
      group.appendChild(header);

      // Subtopic list
      const stList = document.createElement('div');
      stList.className = 'subtopic-list';

      subtopics.forEach(st => {
        const sid = 'st_' + slug(topic) + '_' + slug(st);
        const item = document.createElement('div');
        item.className = 'subtopic-item';
        item.innerHTML = `
          <input type="checkbox" id="${sid}" data-topic="${topic}" data-subtopic="${st}" checked>
          <label for="${sid}">${st}</label>
          <span class="badge">${tree[topic][st]}</span>
        `;
        stList.appendChild(item);
      });

      group.appendChild(stList);
      topicList.appendChild(group);

      // Toggle expand
      const arrow = header.querySelector('.arrow');
      header.addEventListener('click', e => {
        if (e.target.tagName === 'INPUT') return;
        const open = stList.classList.toggle('open');
        arrow.classList.toggle('open', open);
      });

      // Topic checkbox controls subtopics
      const topicCb = header.querySelector('input');
      topicCb.addEventListener('change', () => {
        stList.querySelectorAll('input').forEach(cb => { cb.checked = topicCb.checked; });
        updateCount();
      });

      // Subtopic checkboxes update topic
      stList.querySelectorAll('input').forEach(cb => {
        cb.addEventListener('change', () => {
          const all = stList.querySelectorAll('input');
          const checked = stList.querySelectorAll('input:checked');
          topicCb.checked = checked.length === all.length;
          topicCb.indeterminate = checked.length > 0 && checked.length < all.length;
          updateCount();
        });
      });
    });

    updateCount();
  }

  function slug(s) { return s.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase(); }

  function getSelectedCards() {
    const selected = new Set();
    document.querySelectorAll('.subtopic-item input:checked').forEach(cb => {
      selected.add(cb.dataset.topic + '|||' + cb.dataset.subtopic);
    });
    return CARDS.filter(c => selected.has(c.topic + '|||' + c.subtopic));
  }

  function updateCount() {
    const n = getSelectedCards().length;
    selectedCount.textContent = n + ' question' + (n !== 1 ? 's' : '') + ' selected';
    startBtn.disabled = n === 0;
    startBtn.style.opacity = n === 0 ? '0.4' : '1';
  }

  selectAllBtn.addEventListener('click', () => {
    document.querySelectorAll('#topic-list input[type="checkbox"]').forEach(cb => {
      cb.checked = true;
      cb.indeterminate = false;
    });
    updateCount();
  });

  deselectAllBtn.addEventListener('click', () => {
    document.querySelectorAll('#topic-list input[type="checkbox"]').forEach(cb => {
      cb.checked = false;
      cb.indeterminate = false;
    });
    updateCount();
  });

  // ── Quiz ──
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  startBtn.addEventListener('click', () => {
    deck = shuffle(getSelectedCards());
    if (deck.length === 0) return;
    idx = 0;
    topicScreen.style.display = 'none';
    quizScreen.style.display = 'block';
    backBtn.style.display = 'inline-flex';
    showCard();
  });

  backBtn.addEventListener('click', () => {
    quizScreen.style.display = 'none';
    topicScreen.style.display = 'block';
    backBtn.style.display = 'none';
    topbarCounter.textContent = '';
  });

  function showCard() {
    if (idx >= deck.length) {
      showDone();
      return;
    }
    const c = deck[idx];
    qTopic.textContent = c.topic;
    qSubtopic.textContent = c.subtopic;
    qQuestion.textContent = c.question;
    qAnswer.textContent = c.answer;
    qAnswer.classList.remove('visible');
    qNotes.textContent = c.notes ? 'Note: ' + c.notes : '';
    qNotes.style.display = c.notes ? 'block' : 'none';

    revealBtn.style.display = 'inline-flex';
    nextBtn.style.display = 'none';
    answerRevealed = false;

    topbarCounter.textContent = (idx + 1) + ' / ' + deck.length;
    progressFill.style.width = ((idx + 1) / deck.length * 100) + '%';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  revealBtn.addEventListener('click', () => {
    qAnswer.classList.add('visible');
    revealBtn.style.display = 'none';
    nextBtn.style.display = 'inline-flex';
    answerRevealed = true;
  });

  nextBtn.addEventListener('click', () => {
    idx++;
    showCard();
  });

  function showDone() {
    quizScreen.innerHTML = `
      <div class="done-screen">
        <h2>All Done!</h2>
        <p>You reviewed all ${deck.length} questions.</p>
        <button class="btn btn-primary" onclick="location.reload()">Start Over</button>
      </div>
    `;
    topbarCounter.textContent = '';
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if (quizScreen.style.display !== 'block') return;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (!answerRevealed) revealBtn.click();
      else nextBtn.click();
    }
  });

  // ── Init ──
  checkSession();
})();
</script>
</body>
</html>
